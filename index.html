<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macro Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 20px;
    }
    .dashboard { max-width: 900px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 { font-size: 1.6rem; color: #111; }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .date-label {
      font-size: 0.9rem;
      color: #555;
    }
    input[type="date"] {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #333;
      background: white;
      cursor: pointer;
    }
    input[type="date"]:focus {
      outline: none;
      border-color: #2563eb;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    h2 {
      font-size: 0.85rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .latest {
      font-size: 2.4rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }
    .sub-latest {
      font-size: 1.1rem;
      color: #444;
      margin-bottom: 4px;
    }
    .change { font-size: 1rem; margin-bottom: 20px; }
    .positive { color: #16a34a; }
    .negative { color: #dc2626; }
    .updated { font-size: 0.75rem; color: #999; margin-top: 10px; }
    .note { font-size: 0.75rem; color: #aaa; margin-top: 6px; font-style: italic; }
    canvas { max-height: 220px; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>Macro Dashboard</h1>
      <div class="controls">
        <span class="date-label">From:</span>
        <input type="date" id="startDate" />
        <button id="refreshBtn">↻ Refresh</button>
      </div>
    </div>

    <div class="card">
      <h2>USD / KRW</h2>
      <div class="latest" id="usdkrw-latest">Loading...</div>
      <div class="change" id="usdkrw-change"></div>
      <canvas id="usdkrw-chart"></canvas>
      <div class="updated" id="usdkrw-updated"></div>
    </div>

    <div class="card">
      <h2>Korea 10Y Treasury Bond ETF (152380.KS)</h2>
      <div class="latest" id="kr10y-latest">Loading...</div>
      <div class="change" id="kr10y-change"></div>
      <canvas id="kr10y-chart"></canvas>
      <div class="updated" id="kr10y-updated"></div>
      <div class="note">KODEX 10Y Futures ETF — directional proxy for KR 10yr government bond yield. Price down = yields up.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    const API_KEY = '451be6f89061491c834957a24a0b1367';
    const WORKER_URL = 'https://square-sun-8ce2.yihua-lu.workers.dev';
    const charts = {};

    // Set default start date to 1 month ago
    const defaultStart = new Date();
    defaultStart.setMonth(defaultStart.getMonth() - 1);
    document.getElementById('startDate').value = defaultStart.toISOString().split('T')[0];
    document.getElementById('startDate').max = new Date().toISOString().split('T')[0];

    document.getElementById('refreshBtn').addEventListener('click', loadData);

    function getDateRange() {
      const startDate = document.getElementById('startDate').value;
      const today = new Date();
      const start = new Date(startDate);
      const diffDays = Math.ceil((today - start) / (1000 * 60 * 60 * 24));

      // Yahoo Finance uses range strings, Twelve Data uses outputsize (number of days)
      let yahooRange;
      if (diffDays <= 5) yahooRange = '5d';
      else if (diffDays <= 30) yahooRange = '1mo';
      else if (diffDays <= 90) yahooRange = '3mo';
      else if (diffDays <= 180) yahooRange = '6mo';
      else if (diffDays <= 365) yahooRange = '1y';
      else if (diffDays <= 730) yahooRange = '2y';
      else yahooRange = '5y';

      return { diffDays, yahooRange, startDate };
    }

    async function loadData() {
      const btn = document.getElementById('refreshBtn');
      btn.textContent = '↻ Loading...';
      btn.disabled = true;
      const { diffDays, yahooRange, startDate } = getDateRange();
      await Promise.all([
        fetchTwelve('USD/KRW', 'usdkrw', '₩', 2, '#2563eb', diffDays, startDate),
        fetchWorker('152380.KS', 'kr10y', '₩', 0, '#7c3aed', yahooRange)
      ]);
      btn.textContent = '↻ Refresh';
      btn.disabled = false;
    }

    async function fetchTwelve(symbol, id, unit, decimals, color, diffDays, startDate) {
      try {
        const outputsize = Math.min(Math.ceil(diffDays * 1.5), 5000);
        const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(symbol)}&interval=1day&outputsize=${outputsize}&apikey=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.status === 'error') throw new Error(data.message);
        if (!data.values || data.values.length === 0) throw new Error('No data');

        // Filter to start date
        const start = new Date(startDate);
        const sorted = [...data.values]
          .reverse()
          .filter(d => new Date(d.datetime) >= start);

        const labels = sorted.map(d => d.datetime.slice(5));
        const values = sorted.map(d => parseFloat(d.close));
        renderCard(id, labels, values, unit, decimals, color);
      } catch (e) {
        showError(`${id}-latest`, e.message);
      }
    }

    async function fetchWorker(symbol, id, unit, decimals, color, yahooRange) {
      try {
        const url = `${WORKER_URL}?symbol=${encodeURIComponent(symbol)}&range=${yahooRange}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.chart || !data.chart.result || data.chart.result.length === 0) throw new Error('No data');

        const result = data.chart.result[0];
        const startDate = new Date(document.getElementById('startDate').value);
        const timestamps = result.timestamp;
        const closes = result.indicators.quote[0].close;

        const points = timestamps
          .map((ts, i) => ({ label: formatDate(ts), value: closes[i], date: new Date(ts * 1000) }))
          .filter(d => d.value !== null && d.value !== undefined && d.date >= startDate);

        if (points.length === 0) throw new Error('No data in range');

        renderCard(id, points.map(d => d.label), points.map(d => d.value), unit, decimals, color);
      } catch (e) {
        showError(`${id}-latest`, e.message);
      }
    }

    function renderCard(id, labels, values, unit, decimals, color) {
      const latest = values[values.length - 1];
      const prev   = values[values.length - 2];
      const change = latest - prev;
      const pct    = ((change / prev) * 100).toFixed(2);

      document.getElementById(`${id}-latest`).textContent =
        latest.toLocaleString('en-US', { maximumFractionDigits: decimals }) + ' ' + unit;

      const el = document.getElementById(`${id}-change`);
      el.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(decimals)} (${pct}%) vs prev close`;
      el.className = 'change ' + (change >= 0 ? 'positive' : 'negative');

      document.getElementById(`${id}-updated`).textContent =
        'Last updated: ' + new Date().toLocaleString();

      const ctx = document.getElementById(`${id}-chart`).getContext('2d');
      if (charts[id]) charts[id].destroy();
      charts[id] = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: values,
            borderColor: color,
            backgroundColor: color + '15',
            borderWidth: 2,
            pointRadius: labels.length > 60 ? 0 : 3,
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              ticks: {
                callback: v => v.toLocaleString('en-US', { maximumFractionDigits: decimals }) + ' ' + unit
              }
            }
          }
        }
      });
    }

    function showError(elId, msg) {
      const el = document.getElementById(elId);
      if (el) el.textContent = 'Error: ' + msg;
      console.error(elId, msg);
    }

    function formatDate(ts) {
      const d = new Date(ts * 1000);
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    // Also need to update the Cloudflare Worker to accept a range parameter
    // The worker URL call now passes &range= so update your worker code too

    loadData();
  </script>
</body>
</html>
