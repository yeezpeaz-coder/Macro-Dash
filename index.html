<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macro Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 20px;
    }
    .dashboard { max-width: 900px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    h1 { font-size: 1.6rem; color: #111; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    h2 {
      font-size: 0.85rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .latest {
      font-size: 2.4rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }
    .sub-latest {
      font-size: 1.1rem;
      color: #444;
      margin-bottom: 4px;
    }
    .change { font-size: 1rem; margin-bottom: 20px; }
    .positive { color: #16a34a; }
    .negative { color: #dc2626; }
    .updated { font-size: 0.75rem; color: #999; margin-top: 10px; }
    .note { font-size: 0.75rem; color: #aaa; margin-top: 6px; font-style: italic; }
    canvas { max-height: 220px; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>Macro Dashboard</h1>
      <button id="refreshBtn">↻ Refresh</button>
    </div>

    <div class="card">
      <h2>USD / KRW</h2>
      <div class="latest" id="usdkrw-latest">Loading...</div>
      <div class="change" id="usdkrw-change"></div>
      <canvas id="usdkrw-chart"></canvas>
      <div class="updated" id="usdkrw-updated"></div>
    </div>

    <div class="card">
      <h2>Korea 10Y Treasury Bond — Implied Yield</h2>
      <div class="latest" id="kr10y-yield">Loading...</div>
      <div class="sub-latest" id="kr10y-etf"></div>
      <div class="change" id="kr10y-change"></div>
      <canvas id="kr10y-chart"></canvas>
      <div class="updated" id="kr10y-updated"></div>
      <div class="note">Implied yield calculated from ETF 365780.KS price using modified duration (8.7yr). Anchor: 3.95% yield at ₩83,725. Price down = yields up.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    const API_KEY = '451be6f89061491c834957a24a0b1367';
    const WORKER_URL = 'https://square-sun-8ce2.yihua-lu.workers.dev';
    const charts = {};

    // Modified duration parameters
    const MOD_DURATION = 8.7;
    const ANCHOR_PRICE = 84220;
    const ANCHOR_YIELD = 3.93;

    function priceToYield(price) {
      const priceChangePct = (price - ANCHOR_PRICE) / ANCHOR_PRICE;
      const yieldChange = -priceChangePct * MOD_DURATION * 100;
      return Math.round((ANCHOR_YIELD + yieldChange) * 1000) / 1000;
    }

    document.getElementById('refreshBtn').addEventListener('click', loadData);

    async function loadData() {
      const btn = document.getElementById('refreshBtn');
      btn.textContent = '↻ Loading...';
      btn.disabled = true;
      await Promise.all([
        fetchTwelve('USD/KRW', 'usdkrw', '₩', 2, '#2563eb'),
        fetchKR10Y()
      ]);
      btn.textContent = '↻ Refresh';
      btn.disabled = false;
    }

    async function fetchTwelve(symbol, id, unit, decimals, color) {
      try {
        const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(symbol)}&interval=1day&outputsize=30&apikey=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.status === 'error') throw new Error(data.message);
        if (!data.values || data.values.length === 0) throw new Error('No data');
        const sorted = [...data.values].reverse();
        const labels = sorted.map(d => d.datetime.slice(5));
        const values = sorted.map(d => parseFloat(d.close));
        renderCard(id, labels, values, unit, decimals, '#2563eb');
      } catch (e) {
        showError('usdkrw-latest', e.message);
      }
    }

    async function fetchKR10Y() {
      try {
        const url = `${WORKER_URL}?symbol=365780.KS`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.chart || !data.chart.result || data.chart.result.length === 0) throw new Error('No data');

        const result = data.chart.result[0];
        const timestamps = result.timestamp;
        const closes = result.indicators.quote[0].close;

        const points = timestamps
          .map((ts, i) => ({ label: formatDate(ts), price: closes[i] }))
          .filter(d => d.price !== null && d.price !== undefined);

        if (points.length === 0) throw new Error('All values null');

        const labels = points.map(d => d.label);
        const prices = points.map(d => d.price);
        const yields = prices.map(p => priceToYield(p));

        const latestYield = yields[yields.length - 1];
        const prevYield   = yields[yields.length - 2];
        const latestPrice = prices[prices.length - 1];
        const yieldChange = latestYield - prevYield;
        const yieldChangeBps = Math.round(yieldChange * 100);

        document.getElementById('kr10y-yield').textContent =
          latestYield.toFixed(3) + ' %';

        document.getElementById('kr10y-etf').textContent =
          'ETF Price: ₩' + latestPrice.toLocaleString('en-US', { maximumFractionDigits: 0 });

        const changeEl = document.getElementById('kr10y-change');
        changeEl.textContent =
          `${yieldChange >= 0 ? '+' : ''}${yieldChangeBps}bps vs prev close`;
        changeEl.className = 'change ' + (yieldChange >= 0 ? 'positive' : 'negative');

        document.getElementById('kr10y-updated').textContent =
          'Last updated: ' + new Date().toLocaleString();

        const ctx = document.getElementById('kr10y-chart').getContext('2d');
        if (charts['kr10y']) charts['kr10y'].destroy();
        charts['kr10y'] = new Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              data: yields,
              borderColor: '#7c3aed',
              backgroundColor: '#7c3aed15',
              borderWidth: 2,
              pointRadius: 3,
              fill: true,
              tension: 0.3
            }]
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              y: {
                ticks: {
                  callback: v => v.toFixed(2) + '%'
                }
              }
            }
          }
        });

      } catch (e) {
        showError('kr10y-yield', e.message);
      }
    }

    function renderCard(id, labels, values, unit, decimals, color) {
      const latest = values[values.length - 1];
      const prev   = values[values.length - 2];
      const change = latest - prev;
      const pct    = ((change / prev) * 100).toFixed(2);

      document.getElementById(`${id}-latest`).textContent =
        latest.toLocaleString('en-US', { maximumFractionDigits: decimals }) + ' ' + unit;

      const el = document.getElementById(`${id}-change`);
      el.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(decimals)} (${pct}%) vs prev close`;
      el.className = 'change ' + (change >= 0 ? 'positive' : 'negative');

      document.getElementById(`${id}-updated`).textContent =
        'Last updated: ' + new Date().toLocaleString();

      const ctx = document.getElementById(`${id}-chart`).getContext('2d');
      if (charts[id]) charts[id].destroy();
      charts[id] = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: values,
            borderColor: color,
            backgroundColor: color + '15',
            borderWidth: 2,
            pointRadius: 3,
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              ticks: {
                callback: v => v.toLocaleString('en-US', { maximumFractionDigits: decimals }) + ' ' + unit
              }
            }
          }
        }
      });
    }

    function showError(elId, msg) {
      const el = document.getElementById(elId);
      if (el) el.textContent = 'Error: ' + msg;
      console.error(elId, msg);
    }

    function formatDate(ts) {
      const d = new Date(ts * 1000);
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    loadData();
  </script>
</body>
</html>
